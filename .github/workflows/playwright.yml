name: Playwright Tests
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PLAYWRIGHT_IMAGE: mcr.microsoft.com/playwright:v1.58.2-noble

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Run Playwright tests
        run: |
          docker run --rm \
            --ipc=host \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            -e CI \
            "${{ env.PLAYWRIGHT_IMAGE }}" \
            bash -ec "npm ci && npx playwright test"
      - name: Publish JUnit Test Report
        uses: mikepenz/action-junit-report@v6.4.0
        if: success()
        with:
          report_paths: '**/out/reports/junitReport.xml'
      - uses: actions/upload-artifact@v7.0.0
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: out/reports/playwright/
          retention-days: 30
      - uses: actions/upload-artifact@v7.0.0
        if: ${{ !cancelled() }}
        with:
          name: ortoni-report
          path: out/reports/ortoni/
          retention-days: 30

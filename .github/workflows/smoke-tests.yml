name: Smoke Tests
on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:
    inputs:
      env_name:
        description: 'Target environment'
        required: false
        default: prod
        type: choice
        options:
          - qa
          - prod
  schedule:
    - cron: '0 6 * * 3'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PLAYWRIGHT_IMAGE: mcr.microsoft.com/playwright:v1.59.1-noble

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      ENV_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.env_name || 'prod' }}
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Create env file from secrets
        env:
          ENV_FILE_QA: ${{ secrets.ENV_FILE_QA }}
          ENV_FILE_PROD: ${{ secrets.ENV_FILE_PROD }}
        run: |
          if [ "$ENV_NAME" = "qa" ]; then
            printf '%s' "$ENV_FILE_QA" > "config/.env.${ENV_NAME}"
          else
            printf '%s' "$ENV_FILE_PROD" > "config/.env.${ENV_NAME}"
          fi
      - name: Run Playwright tests
        run: |
          docker run --rm \
            --ipc=host \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            -e CI \
            -e "env_name=$ENV_NAME" \
            "${{ env.PLAYWRIGHT_IMAGE }}" \
            bash -ec "npm ci && npx playwright test --grep=@Smoke"
      - name: Publish JUnit Test Report
        uses: mikepenz/action-junit-report@v6.4.0
        if: success()
        with:
          report_paths: '**/out/reports/junitReport.xml'
      - uses: actions/upload-artifact@v7.0.0
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: out/reports/playwright/
          retention-days: 30
      - uses: actions/upload-artifact@v7.0.0
        if: ${{ !cancelled() }}
        with:
          name: ortoni-report
          path: out/reports/ortoni/
          retention-days: 30
      - name: Get Allure Report history
        uses: actions/checkout@v6.0.2
        if: always()
        continue-on-error: true
        with:
          ref: reports
          path: reports/allure/smoke
      - name: Build Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        id: allure-report
        with:
          allure_results: out/results/allure
          gh_pages: reports/allure/smoke
          allure_report: smoke/allure/allure-report
          allure_history: smoke/allure/allure-history
          keep_reports: 20
          subfolder: smoke/allure
      - name: Deploy Allure report to Github Pages in the Smoke dir
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: reports
          folder: smoke/allure/allure-history
          clean: false
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Deploy Playwright HTML report to reports branch (smoke)
        if: always()
        continue-on-error: true
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: reports
          folder: out/reports/playwright
          target-folder: smoke/playwright
          clean: false
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Deploy Ortoni report to reports branch (smoke)
        if: always()
        continue-on-error: true
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: reports
          folder: out/reports/ortoni
          target-folder: smoke/ortoni
          clean: false
          token: ${{ secrets.GITHUB_TOKEN }}

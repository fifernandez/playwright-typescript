name: Smoke Tests
on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 3'

env:
  PLAYWRIGHT_IMAGE: mcr.microsoft.com/playwright:v1.58.2-noble

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Playwright tests
        run: |
          docker run --rm \
            --ipc=host \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            -e CI \
            "${{ env.PLAYWRIGHT_IMAGE }}" \
            bash -ec "npm ci && npx playwright test --grep=@Smoke"
      - name: Publish JUnit Test Report
        uses: mikepenz/action-junit-report@v6
        if: success()
        with:
          report_paths: '**/test-results/jsonReport.xml'
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      - name: Get Allure Report history
        uses: actions/checkout@v6
        if: always()
        continue-on-error: true
        with:
          ref: reports
          path: reports/allure/smoke
      - name: Build Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        id: allure-report
        with:
          allure_results: allure-results
          gh_pages: reports/allure/smoke
          allure_report: smoke/allure/allure-report
          allure_history: smoke/allure/allure-history
          keep_reports: 20
          subfolder: smoke/allure
      - name: Deploy Allure report to Github Pages in the Smoke dir
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: reports
          folder: smoke/allure/allure-history
          clean: false
          token: ${{ secrets.GITHUB_TOKEN }}

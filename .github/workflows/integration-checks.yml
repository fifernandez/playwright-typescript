name: Integration Checks

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24.x
          cache: 'npm'
      - run: npm ci
      - run: npm audit
      - run: npm run pretest
      - run: npm run lint
      - run: npm run check-style

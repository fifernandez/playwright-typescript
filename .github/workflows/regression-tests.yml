name: Regression Tests
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 5'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PLAYWRIGHT_IMAGE: mcr.microsoft.com/playwright:v1.58.2-noble

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Run Playwright tests
        run: |
          docker run --rm \
            --ipc=host \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            -e CI \
            "${{ env.PLAYWRIGHT_IMAGE }}" \
            bash -ec "npm ci && npx playwright test --grep=@Regression"
      - name: Publish JUnit Test Report
        uses: mikepenz/action-junit-report@v6.4.0
        if: success()
        with:
          report_paths: '**/test-results/jsonReport.xml'
      - uses: actions/upload-artifact@v7.0.0
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      - name: Get Allure Report history
        uses: actions/checkout@v6.0.2
        if: always()
        continue-on-error: true
        with:
          ref: reports
          path: reports/allure/regression
      - name: Build Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        id: allure-report
        with:
          allure_results: allure-results
          gh_pages: reports/allure/regression
          allure_report: regression/allure/allure-report
          allure_history: regression/allure/allure-history
          keep_reports: 20
          subfolder: regression/allure
      - name: Deploy Allure report to Github Pages in the Regression dir
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: reports
          folder: regression/allure/allure-history
          clean: false
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Deploy Playwright HTML report to reports branch (regression)
        if: always()
        continue-on-error: true
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: reports
          folder: playwright-report
          target-folder: regression/playwright
          clean: false
          token: ${{ secrets.GITHUB_TOKEN }}
